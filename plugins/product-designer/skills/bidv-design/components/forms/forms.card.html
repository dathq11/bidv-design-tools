<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--surface-default); }
  .panel { background: var(--surface-high); border: 1px solid var(--border-subtle); border-radius: var(--radius-12); padding: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--text-lowest); margin-bottom: 12px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TextField, Select, Checkbox, RadioGroup, Switch } = window.BIDVBackOfficeDesignSystem_478bc4;
function Demo() {
  const [sel, setSel] = React.useState('hanoi');
  const [method, setMethod] = React.useState('internal');
  const [chk, setChk] = React.useState(true);
  const [sw, setSw] = React.useState(true);
  return (
    <div className="grid">
      <div className="panel stack">
        <div className="lbl">TextField</div>
        <TextField label="Số tài khoản" placeholder="Nhập số tài khoản" iconLeft="search" />
        <TextField label="Số tiền" defaultValue="1.500.000" required helperText="Đơn vị: VND" />
        <TextField label="Mã OTP" defaultValue="000" required error="Mã OTP không hợp lệ" />
      </div>
      <div className="panel stack">
        <div className="lbl">Select</div>
        <Select label="Chi nhánh" value={sel} onChange={setSel}
          options={[{value:'hoiso',label:'Hội sở chính'},{value:'hanoi',label:'Chi nhánh Hà Nội'},{value:'hcm',label:'Chi nhánh TP. HCM'}]} />
        <Select label="Loại giao dịch" placeholder="Chọn loại..." options={['Chuyển khoản','Nạp tiền','Rút tiền']} />
      </div>
      <div className="panel stack">
        <div className="lbl">Checkbox & Radio</div>
        <Checkbox checked={chk} onChange={setChk} label="Lưu thông tin người nhận" />
        <Checkbox checked={false} onChange={()=>{}} label="Đặt làm mặc định" />
        <RadioGroup value={method} onChange={setMethod}
          options={[{value:'internal',label:'Nội bộ BIDV'},{value:'napas',label:'Liên ngân hàng (Napas)'}]} />
      </div>
      <div className="panel stack">
        <div className="lbl">Switch</div>
        <Switch checked={sw} onChange={setSw} label="Cho phép giao dịch trực tuyến" />
        <Switch checked={false} onChange={()=>{}} label="Thông báo qua SMS" />
        <Switch checked={true} disabled label="Xác thực 2 lớp (bắt buộc)" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
