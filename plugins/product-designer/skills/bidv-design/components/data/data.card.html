<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--surface-default); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DataTable, Badge, Avatar, IconButton } = window.BIDVBackOfficeDesignSystem_478bc4;
const fmt = n => n.toLocaleString('vi-VN') + ' ₫';
const rows = [
  { id:'GD0012', customer:'Nguyễn Văn An', acct:'2110 **** 8842', amount:15000000, status:'Thành công', tone:'positive', date:'24/06 14:32' },
  { id:'GD0013', customer:'Trần Thị Bình', acct:'1900 **** 0271', amount:2400000, status:'Đang xử lý', tone:'notice', date:'24/06 14:21' },
  { id:'GD0014', customer:'Lê Minh Cường', acct:'2110 **** 5530', amount:48750000, status:'Chờ duyệt', tone:'informative', date:'24/06 13:58' },
  { id:'GD0015', customer:'Phạm Thu Hà', acct:'3140 **** 1199', amount:760000, status:'Từ chối', tone:'negative', date:'24/06 13:40' },
];
function Demo() {
  const [sel, setSel] = React.useState(['GD0014']);
  const [sort, setSort] = React.useState({ key:'amount', dir:'desc' });
  return (
    <DataTable
      selectable selected={sel} onSelectChange={setSel}
      sort={sort} onSortChange={setSort}
      rowKey="id"
      columns={[
        { key:'id', header:'Mã GD', sortable:true, render:r=><span style={{fontFamily:'var(--font-mono)',fontSize:13}}>{r.id}</span> },
        { key:'customer', header:'Khách hàng', render:r=>(
          <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
            <Avatar name={r.customer} size="xs" />{r.customer}
          </span>) },
        { key:'acct', header:'Số tài khoản', render:r=><span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--text-low)'}}>{r.acct}</span> },
        { key:'amount', header:'Số tiền', align:'right', sortable:true, render:r=><b style={{fontWeight:500}}>{fmt(r.amount)}</b> },
        { key:'status', header:'Trạng thái', render:r=><Badge tone={r.tone} dot>{r.status}</Badge> },
        { key:'date', header:'Thời gian', render:r=><span style={{color:'var(--text-low)'}}>{r.date}</span> },
        { key:'actions', header:'', align:'right', render:()=><IconButton icon="more-horizontal" size="S" ariaLabel="Tùy chọn" /> },
      ]}
      data={rows}
    />
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
