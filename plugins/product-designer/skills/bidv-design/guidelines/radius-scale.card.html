<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radius" subtitle="4 · 8 (controls) · 12 (cards) · 16 · 24 · full" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-high); }
  .scale { display: flex; align-items: center; gap: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 72px; background: var(--primary-50); border: 1.5px solid var(--primary-400); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-low); }
</style>
</head>
<body>
  <div class="scale">
    <div class="item"><div class="box" style="border-radius:4px"></div><span class="lbl">4</span></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><span class="lbl">8 ctrl</span></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><span class="lbl">12 card</span></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><span class="lbl">16</span></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><span class="lbl">24</span></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><span class="lbl">full</span></div>
  </div>
</body>
</html>
