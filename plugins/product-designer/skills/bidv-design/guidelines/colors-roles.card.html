<!-- @dsCard group="Colors" viewport="700x200" name="Semantic Surface & Text" subtitle="Background, text, border roles used across the back office" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--surface-default); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile { background: var(--surface-high); border: 1px solid var(--border-subtle); border-radius: var(--radius-8); padding: 12px; box-shadow: var(--shadow-xs); }
  .line { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .chip { width: 20px; height: 20px; border-radius: var(--radius-4); border: 1px solid var(--black-a10); flex: none; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-low); }
  .v { color: var(--text-default); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <div class="line"><span class="chip" style="background:var(--surface-high)"></span><span class="v t-label-12">Surface high</span></div>
      <div class="line"><span class="chip" style="background:var(--surface-default)"></span><span class="v t-label-12">Surface default</span></div>
      <div class="line"><span class="chip" style="background:var(--surface-brand-subtle)"></span><span class="v t-label-12">Brand subtle</span></div>
      <div class="line"><span class="chip" style="background:var(--surface-brand-intermediate)"></span><span class="v t-label-12">Brand CTA</span></div>
    </div>
    <div class="tile">
      <div class="line"><span class="chip" style="background:var(--text-default)"></span><span class="tok">text/default · #333</span></div>
      <div class="line"><span class="chip" style="background:var(--text-low)"></span><span class="tok">text/low · #666</span></div>
      <div class="line"><span class="chip" style="background:var(--text-lowest)"></span><span class="tok">text/lowest · #999</span></div>
      <div class="line"><span class="chip" style="background:var(--text-brand)"></span><span class="tok">text/brand · #006b68</span></div>
    </div>
  </div>
</body>
</html>
