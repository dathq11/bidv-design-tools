<!-- @dsCard group="Colors" viewport="700x150" name="Secondary — Amber" subtitle="BIDV gold accent · 300 is the signature flower gold" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--surface-high); }
  .row { display: flex; gap: 0; border-radius: var(--radius-8); overflow: hidden; box-shadow: var(--shadow-xs); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2px; }
  .lt { color: var(--gray-800); }
  .dk { color: rgba(255,255,255,0.92); }
  .cap { margin: 0 0 10px; color: var(--text-low); }
</style>
</head>
<body>
  <p class="t-label-12 cap">Colors / Secondary</p>
  <div class="row">
    <div class="sw" style="background:var(--secondary-50)"><span class="lt">50</span></div>
    <div class="sw" style="background:var(--secondary-100)"><span class="lt">100</span></div>
    <div class="sw" style="background:var(--secondary-200)"><span class="lt">200</span></div>
    <div class="sw" style="background:var(--secondary-300)"><span class="lt">300 ★</span></div>
    <div class="sw" style="background:var(--secondary-400)"><span class="dk">400</span></div>
    <div class="sw" style="background:var(--secondary-500)"><span class="dk">500</span></div>
    <div class="sw" style="background:var(--secondary-700)"><span class="dk">700</span></div>
    <div class="sw" style="background:var(--secondary-900)"><span class="dk">900</span></div>
  </div>
</body>
</html>
